<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Management</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-wrapper">

    <!-- Header -->
    <header class="app-header">
      <h1 class="app-title">User Management</h1>
      <span class="user-count" id="user-count">0 users</span>
    </header>

    <!-- Add User Form -->
    <section class="add-user-section" id="add-user-section">
      <div class="form-row">
        <div class="input-group">
          <label for="user-name-input" class="input-label">Full Name</label>
          <input
            type="text"
            id="user-name-input"
            class="text-input"
            placeholder="e.g. Jane Smith"
            autocomplete="off"
          />
        </div>
        <div class="input-group">
          <label for="user-email-input" class="input-label">Email</label>
          <input
            type="email"
            id="user-email-input"
            class="text-input"
            placeholder="e.g. jane@example.com"
            autocomplete="off"
          />
        </div>
        <div class="input-group">
          <label for="user-role-select" class="input-label">Role</label>
          <select id="user-role-select" class="select-input">
            <option value="viewer">Viewer</option>
            <option value="editor">Editor</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="input-group input-group--action">
          <label class="input-label input-label--hidden" aria-hidden="true">Action</label>
          <button type="button" id="add-user-btn" class="btn btn--primary">
            + Add User
          </button>
        </div>
      </div>
    </section>

    <!-- Users List -->
    <section class="users-section" id="users-section">

      <!-- Table Header -->
      <div class="users-table-header">
        <span class="col col--name">Name</span>
        <span class="col col--email">Email</span>
        <span class="col col--role">Role</span>
        <span class="col col--status">Status</span>
        <span class="col col--actions">Actions</span>
      </div>

      <!-- User List Container -->
      <ul class="user-list" id="user-list" role="list">

        <!-- Static placeholder rows (replace with JS-generated ones) -->
        <li class="user-card" id="user-1" data-user-id="1">
          <span class="col col--name">
            <!-- <span class="user-avatar" aria-hidden="true">AK</span>
            Arjun Kumar
          </span>
          <span class="col col--email">arjun@example.com</span>
          <span class="col col--role">
            <span class="role-badge role-badge--admin">Admin</span>
          </span>
          <span class="col col--status">
            <span class="status-dot status-dot--active" title="Active"></span>
            Active
          </span>
          <span class="col col--actions">
            <button type="button" class="btn btn--edit" data-action="edit" data-user-id="1">Edit</button>
            <button type="button" class="btn btn--delete" data-action="delete" data-user-id="1">Delete</button> -->
          </span>
        </li>

        <li class="user-card" id="user-2" data-user-id="2">
          <span class="col col--name">
            <span class="user-avatar" aria-hidden="true">PS</span>
            Priya Sharma
          </span>
          <span class="col col--email">priya@example.com</span>
          <span class="col col--role">
            <span class="role-badge role-badge--editor">Editor</span>
          </span>
          <span class="col col--status">
            <span class="status-dot status-dot--active" title="Active"></span>
            Active
          </span>
          <span class="col col--actions">
            <button type="button" class="btn btn--edit" data-action="edit" data-user-id="2">Edit</button>
            <button type="button" class="btn btn--delete" data-action="delete" data-user-id="2">Delete</button>
          </span>
        </li>

        <li class="user-card" id="user-3" data-user-id="3">
          <span class="col col--name">
            <span class="user-avatar" aria-hidden="true">RT</span>
            Rahul Thakur
          </span>
          <span class="col col--email">rahul@example.com</span>
          <span class="col col--role">
            <span class="role-badge role-badge--viewer">Viewer</span>
          </span>
          <span class="col col--status">
            <span class="status-dot status-dot--inactive" title="Inactive"></span>
            Inactive
          </span>
          <span class="col col--actions">
            <button type="button" class="btn btn--edit" data-action="edit" data-user-id="3">Edit</button>
            <button type="button" class="btn btn--delete" data-action="delete" data-user-id="3">Delete</button>
          </span>
        </li>

      </ul>

      <!-- Empty State (shown via JS when list is empty) -->
      <div class="empty-state" id="empty-state" hidden>
        <p class="empty-state__message">No users yet. Add one above.</p>
      </div>

    </section>

  </div><!-- /.app-wrapper -->

  <script src="script.js"></script>
</body>
</html>
